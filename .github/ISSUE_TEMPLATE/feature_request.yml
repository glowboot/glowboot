name: Feature request
description: Suggest a new feature, peripheral, accessibility option, or quality-of-life improvement.
title: "[Feature]: "
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea? Great. Concrete proposals (with a clear "what" and "why") are easier to act on than open-ended wish-lists.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case or limitation that prompts this request. Skip this if it's a pure enhancement with no specific user pain.
    validations:
      required: false

  - type: textarea
    id: proposal
    attributes:
      label: Proposed feature
      description: What should Glowboot do? Be as specific as you can — UI sketches, hardware references, or links to how other tools handle it are welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you considered
      placeholder: "e.g. workaround you currently use, other ways to solve the same problem."
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Anything else
    validations:
      required: false
